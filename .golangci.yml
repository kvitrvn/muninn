run:
  timeout: 3m

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - revive
  # misspell is intentionally omitted: this library carries French domain
  # vocabulary and BOAMP/DECP/BEAUAMP field names (e.g. nature_categorise_libelle,
  # "attribue", "decembre"), which a US-English spell checker flags as errors.

issues:
  exclude-rules:
    # godoc examples favor readability (panic on error).
    - path: example_test\.go
      linters:
        - errcheck
