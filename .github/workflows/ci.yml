name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.26"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      # The prebuilt golangci-lint binaries are compiled with an older Go and
      # refuse a module targeting go 1.26. Build it from source with the Go
      # toolchain installed above; GOTOOLCHAIN=local forces that toolchain
      # instead of golangci-lint's own (older) toolchain directive.
      - name: Install golangci-lint
        env:
          GOTOOLCHAIN: local
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
      - name: golangci-lint
        run: $(go env GOPATH)/bin/golangci-lint run ./...
